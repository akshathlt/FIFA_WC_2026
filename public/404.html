<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>⚽ World Cup 2026 Predictor</title>
    <script>
      var l = window.location;
      var segmentCount = 1; // number of path segments in the repo name (wc2026-predictor = 1)
      var p = l.pathname.slice(1).split('/').slice(segmentCount).join('/');
      var q = l.search ? '&q=' + l.search.slice(1) : '';
      var h = l.hash ? '&h=' + l.hash.slice(1) : '';
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.slice(0, l.pathname.indexOf('/', 1) + 1) +
        '?p=/' + (p ? p + q + h : '')
      );
    </script>
  </head>
  <body></body>
</html>
