<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>⚽ World Cup 2026 Predictor</title>
    <script>
      // GitHub Pages SPA redirect handler
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        // Handle ?p= query param from 404.html redirect
        var search = window.location.search;
        if (search.slice(1,3) === 'p=') {
          var decoded = search.slice(1).split('&').reduce(function(p, s) {
            var r = s.split('=');
            return r[0] === 'p' ? decodeURIComponent(r.slice(1).join('=')) :
                   r[0] === 'q' ? p + '?' + decodeURIComponent(r.slice(1).join('=')) :
                   r[0] === 'h' ? p + '#' + decodeURIComponent(r.slice(1).join('=')) : p;
          }, '');
          history.replaceState(null, null, decoded || '/');
        }
      }());
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
